  <script crossorigin="" src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script><!-- SheetJS per llegir fitxers XLS/XLSX -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=DM+Sans:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap');
    /* ══ TOKENS LIGHT MODE ═════════════════════════════ */
    /* ══ GOOGLE FONTS ═══════════════════════════════════ */
    :root {
      --em:      #10B981;
      --em-d:    #059669;
      --em-l:    #d1fae5;
      --em-ll:   #ecfdf5;
      --blue:    #2563eb;
      --blue-l:  #dbeafe;
      --amber:   #F59E0B;
      --am-bg:   #fffbeb;
      --red:     #EF4444;
      --re-bg:   #fef2f2;
      --purple:  #8b5cf6;
      --orange:  #f97316;
      --teal:    #0d9488;

      --bg:        #F8FAFC;
      --bg2:       #F1F5F9;
      --surface:   #ffffff;
      --surface2:  #F8FAFC;
      --border:    #E2E8F0;
      --border2:   #CBD5E1;
      --text:      #0F172A;
      --text2:     #334155;
      --muted:     #64748B;
      --subtle:    #94A3B8;

      --sidebar-w: 238px;
      --sidebar-bg: linear-gradient(165deg,#060B14 0%,#090F1C 35%,#0D1527 70%,#111D33 100%);
      --sidebar-txt: rgba(255,255,255,.60);
      --sidebar-act: rgba(16,185,129,.16);
      --sidebar-act-txt: #34D399;
      --topbar-h: 0px;
      --radius: 16px;
      --radius-sm: 10px;
      --radius-card: 14px;
      --radius-btn: 10px;
      --radius-badge: 6px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
      --shadow-md: 0 4px 16px rgba(0,0,0,.08), 0 1px 4px rgba(0,0,0,.04);
      --shadow-lg: 0 8px 32px rgba(0,0,0,.12), 0 2px 8px rgba(0,0,0,.06);

      /* ── Tipografia ── */
      --font-sans: 'Plus Jakarta Sans', 'DM Sans', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;

      /* ── Brand ── */
      --brand-blue: #1e4d7b;
      /* ── Mòbil ── */
      --bar-h: 56px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);

      /* ── Amber palette (semàntic) ── */
      --amber-bg:        #fffbeb;
      --amber-border:    #fbbf24;
      --amber-text:      #92400e;
      --amber-text-dark: #78350f;
      --amber-text-mid:  #b45309;
      --amber-accent:    #d97706;
      --amber-warn:      #fef3c7;
    }

    /* ══ DARK MODE — profund (inspirat disseny Flux/Gemini) ════════════════ */
    body.dark {
      --bg:       #090E1A;
      --bg2:      #0D1321;
      --surface:  #111827;
      --surface2: #0A0F1C;
      --border:   #1E2A3D;
      --border2:  #2A3A52;
      --text:     #E8EFF8;
      --text2:    #B8C8DC;
      --muted:    #6B7FA0;
      --subtle:   #4A5A78;
      --em:       #34D399;
      --em-l:     rgba(52,211,153,.15);
      --em-ll:    rgba(52,211,153,.06);
      --re-bg:    rgba(239,68,68,.1);
      --am-bg:    rgba(245,158,11,.08);
      --blue-l:   rgba(37,99,235,.1);
      --sidebar-bg: linear-gradient(165deg,#020509 0%,#060B14 35%,#080E1A 70%,#0B1221 100%);
      --sidebar-act: rgba(52,211,153,.12);
      --sidebar-act-txt: #34D399;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.6);
      --shadow-md: 0 4px 20px rgba(0,0,0,.6);
      --shadow-lg: 0 8px 40px rgba(0,0,0,.7);
    }
    /* Cards en dark mode — vidre fosc */
    body.dark .card,
    body.dark [class*="card"] {
      background: #111827;
      border-color: #1E2A3D;
    }
    /* Topbar dark */
    body.dark .app-topbar {
      background: rgba(9,14,26,0.95);
      border-bottom-color: #1E2A3D;
    }

    /* ══ DARK MODE NUCLEAR — força TOT a fosc ════════════════════════════════ */

    /* 1. Tot l'àrea principal: reset general */
    body.dark .app-main { background: var(--bg) !important; color: var(--text) !important; }
    body.dark .app-main * { color: inherit; }

    /* 2. Tots els div/section/article amb fons clar → fosc */
    body.dark .app-main div,
    body.dark .app-main section,
    body.dark .app-main article,
    body.dark .app-main aside,
    body.dark .app-main li,
    body.dark .app-main ul,
    body.dark .app-main details,
    body.dark .app-main summary {
      background-color: transparent;
    }

    /* 3. Cards i panells — Fix #7: era massa ampli (.app-main > div > div forçava
          tots els divs, inclosos els de layout inline i els highlights temporals).
          Ara usem classes explícites com a primera opció, el selector genèric
          queda com a xarxa de seguretat per a divs sense classe. */
    body.dark .app-main > div > section {
      background: var(--bg) !important;
    }
    /* Classes utilitàries (card-surface ja definit, afegim panel-surface) */
    body.dark .card-surface,
    body.dark .panel-surface {
      background: var(--surface) !important;
    }
    /* Xarxa de seguretat: divs directes sense classe ni estil inline específic */
    body.dark .app-main > div > div:not([style]):not([class]) {
      background: var(--bg);
    }

    /* 4. Inputs, selects, textareas */
    body.dark input,
    body.dark select,
    body.dark textarea {
      background: var(--surface2) !important;
      color: var(--text) !important;
      border-color: var(--border) !important;
    }
    body.dark input::placeholder,
    body.dark textarea::placeholder { color: var(--muted) !important; }
    body.dark select option { background: var(--surface) !important; color: var(--text) !important; }

    /* 5. Taules */
    body.dark table, body.dark th, body.dark td { border-color: var(--border) !important; }
    body.dark thead tr { background: var(--surface2) !important; }
    body.dark tr:hover td { background: rgba(255,255,255,.03) !important; }

    /* 6. Charts SVG — Fix #6: afinat per no afectar valors KPI principals */
    body.dark .app-main svg { background: transparent !important; }
    /* Eixos i labels secundaris → muted */
    body.dark .chart-svg .axis text,
    body.dark .chart-svg .tick text,
    body.dark .chart-svg .legend text { fill: var(--muted) !important; }
    /* Labels de barres/línies (classe .chart-label) → clar però llegible */
    body.dark .chart-svg .chart-label { fill: var(--text2) !important; }
    /* SVG genèric (fora de .chart-svg): segueix sent muted com abans */
    body.dark svg:not(.chart-svg) text { fill: var(--muted) !important; }
    body.dark svg rect[fill="#F8FAFC"], body.dark svg rect[fill="#f8fafc"],
    body.dark svg rect[fill="#fff"], body.dark svg rect[fill="white"] { fill: var(--surface) !important; }

    /* 7. Moviments row hover */
    body.dark .app-main div[style*="borderBottom"]:hover { background: rgba(255,255,255,.04) !important; }

    /* 8. Títols i textos */
    body.dark .app-main h1, body.dark .app-main h2, body.dark .app-main h3,
    body.dark .app-main h4, body.dark .app-main p, body.dark .app-main span,
    body.dark .app-main label { color: var(--text); }

    /* 9. Badges "Despesa" / "Ingrés" — Fix #7: selector menys agressiu */
    /* Nota: button[style*="background"] era massa ampli (afectava botons d'acció).
       Limitem a span badges i botons de categoria explícits */
    body.dark .app-main span[style*="background: var(--border)"],
    body.dark .app-main span[style*="background:var(--border)"] {
      background: var(--surface2) !important;
      color: var(--text2) !important;
      border-color: var(--border) !important;
    }
    /* Classes utilitàries (alternativa progressiva al nuclear) */
    body.dark .badge-neutral {
      background: var(--surface2) !important;
      color: var(--text2) !important;
      border-color: var(--border) !important;
    }

    /* 10. Barres de progrés de fons clar */
    body.dark .app-main div[style*="background: var(--border)"] { background: var(--border2) !important; }

    /* 11. Recomanació copilot card (fons verdós molt clar) */
    body.dark .app-main div[style*="var(--em-ll)"] { background: rgba(16,185,129,.07) !important; border-color: rgba(16,185,129,.15) !important; }

    /* ══ FI DARK OVERRIDES ══════════════════════════════════════════════════ */

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { background: var(--bg); font-family: 'Plus Jakarta Sans', 'DM Sans', sans-serif;
           color: var(--text); transition: background .25s, color .25s; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

    @keyframes spin      { to { transform: rotate(360deg); } }
    @keyframes fadeIn    { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
    @keyframes slideUp   { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pop       { 0%{transform:scale(.92);opacity:0} 70%{transform:scale(1.03)} 100%{transform:scale(1);opacity:1} }
    @keyframes fadeInUp  { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulseRing { 0%{transform:scale(1);opacity:.6} 70%{transform:scale(1.18);opacity:0} 100%{transform:scale(1);opacity:0} }

    /* ══ DASHBOARD STAGGERED ENTRY ═══════════════════════ */
    .dash-entry { animation: fadeInUp .45s cubic-bezier(.22,1,.36,1) both; }
    .dash-entry-1 { animation-delay: .05s; }
    .dash-entry-2 { animation-delay: .12s; }
    .dash-entry-3 { animation-delay: .19s; }
    .dash-entry-4 { animation-delay: .26s; }
    .dash-entry-5 { animation-delay: .33s; }

    /* ══ ZEBRA TAULA MOVIMENTS ════════════════════════════ */
    .txn-zebra-even { background: var(--surface); }
    .txn-zebra-odd  { background: var(--bg); }
    body.dark .txn-zebra-even { background: #111827; }
    body.dark .txn-zebra-odd  { background: #0d1117; }

    /* ══ EMPTY STATE ══════════════════════════════════════ */
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; text-align: center;
      padding: 48px 24px; gap: 12px;
    }
    .empty-state-icon {
      position: relative; margin-bottom: 4px;
    }
    .empty-state-icon::before {
      content: ""; position: absolute; inset: -8px;
      border-radius: 50%; border: 2px solid rgba(16,185,129,.25);
      animation: pulseRing 2.5s ease-out infinite;
    }
    .empty-state-title  { font-size: 16px; font-weight: 700; color: var(--text); }
    .empty-state-desc   { font-size: 13px; color: var(--muted); line-height: 1.6; max-width: 280px; }
    .empty-state-action {
      margin-top: 6px; padding: 9px 22px;
      background: #10B981; color: #fff; border: none;
      border-radius: var(--radius-btn); font-size: 13px;
      font-weight: 600; cursor: pointer;
      transition: background .15s, transform .1s;
    }
    .empty-state-action:hover  { background: #059669; }
    .empty-state-action:active { transform: scale(0.97); }

    /* ══ LAYOUT DESKTOP: sidebar + main ════════════════ */
    .app-shell { display: flex; min-height: 100vh; }

    /* SIDEBAR */
    .sidebar {
      width: var(--sidebar-w); flex-shrink: 0;
      background: var(--sidebar-bg);
      display: flex; flex-direction: column;
      position: fixed; top: 0; left: 0; bottom: 0;
      z-index: 50; overflow-y: auto; overflow-x: hidden;
      box-shadow: 4px 0 32px rgba(0,0,0,0.25), 1px 0 0 rgba(255,255,255,0.04);
    }

    /* ── Capçalera ── */
    .sidebar-logo {
      padding: 18px 14px 14px;
      border-bottom: 1px solid rgba(255,255,255,.07);
      flex-shrink: 0;
    }
    .sidebar-logo-wrap {
      display: flex; align-items: center; gap: 10px; margin-bottom: 6px;
    }
    .flux-icon { width: 34px; height: 34px; flex-shrink: 0; }
    .sidebar-logo-texts { display: flex; flex-direction: column; }
    .sidebar-logo-title {
      font-family: 'Plus Jakarta Sans','DM Sans',sans-serif;
      font-size: 17px; font-weight: 800; color: #fff;
      letter-spacing: -.03em; line-height: 1;
      background: linear-gradient(135deg,#fff 30%,#94d2bd);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .sidebar-logo-sub {
      font-size: 9px; color: rgba(255,255,255,.28); margin-top: 3px;
      font-weight: 600; letter-spacing: .09em; text-transform: uppercase;
    }
    /* Usuari actual sota el logo */
    .sidebar-user-line {
      font-size: 10px; color: rgba(148,210,189,0.75);
      padding: 0 2px 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    /* Botó pill dins capçalera */
    .sidebar-pill-btn {
      display: flex; align-items: center; gap: 7px; width: 100%;
      padding: 7px 10px; border-radius: 9px; cursor: pointer;
      font-family: 'Plus Jakarta Sans','DM Sans',sans-serif;
      font-size: 11px; font-weight: 600; transition: all .18s;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.09);
      color: rgba(255,255,255,0.48); margin-bottom: 5px;
    }
    .sidebar-pill-btn:last-child { margin-bottom: 0; }
    .sidebar-pill-btn:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.75); }
    .sidebar-pill-btn .pill-icon { font-size: 14px; flex-shrink: 0; }
    .sidebar-pill-btn .pill-arrow { margin-left: auto; font-size: 9px; opacity: 0.5; }

    /* ── Nav ── */
    .sidebar-nav {
      flex: 1; padding: 10px 8px 8px;
      display: flex; flex-direction: column; gap: 1px;
      overflow-y: auto;
    }
    .sidebar-item {
      display: flex; align-items: center; gap: 9px;
      padding: 8px 10px; border-radius: 10px; border: none;
      background: rgba(255,255,255,0.015); cursor: pointer; width: 100%;
      font-family: 'Plus Jakarta Sans', 'DM Sans', sans-serif; font-size: 12px;
      color: rgba(255,255,255,0.45); text-align: left; font-weight: 400;
      transition: background .15s, color .15s, border-left-color .15s, box-shadow .15s;
      border-left: 3px solid transparent;
      margin-bottom: 2px;
    }
    .sidebar-item:hover {
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.78);
    }
    .sidebar-item.active {
      color: #ffffff; font-weight: 700;
    }
    .sidebar-item .s-icon { display: none; }
    .sidebar-badge {
      margin-left: auto; color: #fff;
      border-radius: 9px; padding: 2px 7px; font-size: 9px; font-weight: 800;
      min-width: 18px; text-align: center;
      box-shadow: 0 2px 6px rgba(230,57,70,0.45);
    }
    .sidebar-section-label {
      font-size: 9px; font-weight: 700; color: rgba(255,255,255,.20);
      text-transform: uppercase; letter-spacing: .10em;
      padding: 10px 10px 5px;
    }
    .sidebar-section-label:first-child { padding-top: 4px; }

    /* ── Footer ── */
    .sidebar-footer {
      padding: 8px 10px 12px;
      border-top: 1px solid rgba(255,255,255,.06);
      flex-shrink: 0;
    }
    .sidebar-footer-stats {
      font-size: 10px; color: rgba(255,255,255,.22);
      font-family: 'JetBrains Mono', monospace;
      padding: 0 2px 8px;
    }
    .sidebar-footer-user {
      display: flex; align-items: center; gap: 8px; padding: 8px 10px;
      border-radius: 10px; background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.06);
    }
    .sidebar-avatar {
      width: 28px; height: 28px; border-radius: 8px;
      background: linear-gradient(135deg, rgba(16,185,129,.25) 0%, rgba(16,185,129,.12) 100%);
      border: 1px solid rgba(16,185,129,.28);
      display: flex; align-items: center;
      justify-content: center; font-size: 11px; color: #34D399; font-weight: 800;
      flex-shrink: 0;
    }
    .sidebar-email {
      font-size: 10px; color: rgba(255,255,255,.32); flex: 1; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }

    /* MAIN */
    .app-main {
      margin-left: var(--sidebar-w);
      flex: 1; min-height: 100vh;
      display: flex; flex-direction: column;
      width: calc(100% - var(--sidebar-w));
      min-width: 0;
    }
    /* Topbar (dark mode toggle + pending) */
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .app-topbar {
      height: 56px; background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: flex-end;
      padding: 0 28px; gap: 12px;
      position: sticky; top: 0; z-index: 40;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    }
    .main-content { padding: 28px 28px 40px; flex: 1; width: 100%; }

    /* ══ GRID HELPERS ════════════════════════════════════ */
    .kpi-grid    { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 22px; }
    .chart-grid-2{ display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; }
    .form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-top: 14px; }
    .form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .col-map-grid{ display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }

    /* ══ CARDS ═══════════════════════════════════════════ */
    .card {
      background: var(--surface); border-radius: var(--radius);
      border: 1px solid var(--border); padding: 20px 22px;
      margin-bottom: 18px;
      box-shadow: var(--shadow-sm);
      transition: box-shadow .2s;
    }
    .card:hover { box-shadow: var(--shadow-md); }
    .card-header {
      font-size: 11px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .08em;
      margin-bottom: 16px; padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 6px;
    }

    /* KPI cards */
    .kpi-card {
      background: linear-gradient(145deg, var(--surface) 0%, var(--surface2) 100%);
      border-radius: var(--radius);
      border: 1px solid var(--border); padding: 20px 22px;
      position: relative; overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: transform .18s cubic-bezier(.34,1.56,.64,1), box-shadow .18s;
    }
    .kpi-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
    .kpi-card-accent {
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      border-radius: var(--radius) var(--radius) 0 0;
    }
    .kpi-label { font-size: 11px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .07em; margin-bottom: 10px; }
    .kpi-value { font-family: var(--font-mono);
      font-size: 24px; font-weight: 700; color: var(--text); line-height: 1; }
    .kpi-sub { font-size: 11px; color: var(--muted); margin-top: 7px; }
    .kpi-trend { display: inline-flex; align-items: center; gap: 3px;
      font-size: 11px; font-weight: 700; padding: 3px 8px;
      border-radius: 20px; margin-top: 9px; }
    .kpi-icon-bg {
      position: absolute; right: 18px; top: 50%; transform: translateY(-50%);
      width: 48px; height: 48px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center; opacity: .1;
    }

    /* ══ CATEGORY ICON GRID ══════════════════════════════ */
    .cat-icon-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 10px; }
    .cat-icon-item {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      padding: 12px 6px; border-radius: 14px; cursor: default;
      animation: pop .35s ease;
    }
    .cat-icon-circle {
      width: 48px; height: 48px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .cat-icon-amount {
      font-family: var(--font-mono);
      font-size: 12px; font-weight: 700; color: var(--text);
    }
    .cat-icon-name { font-size: 9px; color: var(--muted); text-align: center; line-height: 1.2; }

    /* ══ DONUT CHART ═════════════════════════════════════ */
    .donut-wrap { position: relative; display: flex; align-items: center; justify-content: center; }
    .donut-center {
      position: absolute; text-align: center; pointer-events: none;
    }
    .donut-center-val {
      font-family: var(--font-mono);
      font-size: 20px; font-weight: 700; color: var(--text); line-height: 1;
    }
    .donut-center-lbl { font-size: 10px; color: var(--muted); margin-top: 3px; }

    /* ══ DARK MODE TOGGLE ════════════════════════════════ */
    .dm-toggle {
      width: 40px; height: 22px; border-radius: 11px;
      background: var(--border2); border: none; cursor: pointer;
      position: relative; transition: background .2s; flex-shrink: 0;
    }
    .dm-toggle.on { background: var(--em); }
    .dm-toggle::after {
      content: ''; position: absolute; top: 3px; left: 3px;
      width: 16px; height: 16px; border-radius: 50%; background: #fff;
      transition: transform .2s; box-shadow: 0 1px 3px rgba(0,0,0,.2);
    }
    .dm-toggle.on::after { transform: translateX(18px); }

    /* ══ NORTH STAR (hero al dashboard) ═════════════════ */
    .ns-hero {
      background: linear-gradient(135deg, rgba(16,185,129,.13) 0%, rgba(16,185,129,.04) 100%);
      border: 1.5px solid rgba(16,185,129,.35); border-radius: 18px;
      padding: 20px 22px; margin-bottom: 16px; position: relative; overflow: hidden;
      animation: pop .4s ease;
    }
    body.dark .ns-hero {
      background: linear-gradient(135deg,rgba(16,185,129,.14),rgba(16,185,129,.04));
      border-color: rgba(16,185,129,.28);
    }
    .ns-val {
      font-family: var(--font-mono);
      font-size: clamp(30px,4vw,44px); font-weight: 700;
      color: var(--em); line-height: 1;
    }

    /* ══ BUTTON MICRO-FEEDBACK ════════════════════════════ */
    button:active { transform: scale(0.97); }
    .kpi-card:active { transform: translateY(0) scale(0.99); }
    /* Botons dins de cards no han de propagar el scale */
    .kpi-card button:active { transform: scale(0.97); }

    /* ══ BOTTOM NAV (mòbil) ══════════════════════════════ */
    .bottom-nav { display: none; }
    .top-nav    { display: none; } /* reemplaçat per sidebar */

    /* ══ COPILOT ═════════════════════════════════════════ */
    .chat-container { display: flex; flex-direction: column; height: 520px; }
    .chat-messages  { flex: 1; overflow-y: auto; padding: 12px;
      display: flex; flex-direction: column; gap: 10px; }
    .chat-input-row { display: flex; gap: 8px; padding: 12px;
      border-top: 1px solid var(--border); }

    /* ══ DRAWER "Més" (mòbil) ════════════════════════════ */
    .drawer-overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:150; animation:fadeIn .15s ease; }
    .drawer-sheet {
      position:fixed; bottom:0; left:0; right:0;
      background: var(--surface); border-radius:20px 20px 0 0;
      padding: 10px 16px calc(env(safe-area-inset-bottom,8px) + 76px);
      z-index:151; box-shadow:0 -8px 40px rgba(0,0,0,.2); animation:slideUp .2s ease;
    }
    .drawer-handle { width:40px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 14px; }
    .drawer-grid   { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
    .drawer-item {
      display:flex; flex-direction:column; align-items:center; gap:5px;
      padding:12px 6px; border-radius:14px; border:none;
      background: var(--surface2); cursor:pointer; font-family:'DM Sans',sans-serif;
      transition: background .12s;
    }
    .drawer-item.active { background: var(--em-ll); }
    body.dark .drawer-item.active { background: rgba(16,185,129,.15); }
    .drawer-icon  { font-size:22px; line-height:1; }
    .drawer-label { font-size:11px; font-weight:600; color:var(--muted); text-align:center; }
    .drawer-item.active .drawer-label { color: var(--em); }

    /* Alert styles */
    .alert-amber { background:var(--am-bg); border:1px solid #fde68a; border-radius:10px; padding:10px 13px; }
    .alert-red   { background:var(--re-bg); border:1px solid #fecaca; border-radius:10px; padding:10px 13px; }
    body.dark .alert-amber { background:rgba(245,158,11,.12); border-color:rgba(245,158,11,.3); }
    body.dark .alert-red   { background:rgba(239,68,68,.12);  border-color:rgba(239,68,68,.3); }

    /* ══ MISC ════════════════════════════════════════════ */
    .budget-row-cols { display:flex; align-items:center; }

    /* ══ RESPONSIVE MÒBIL ════════════════════════════════ */
    @media (max-width: 768px) {
      :root { --sidebar-w: 0px; }
      .sidebar    { display: none !important; }
      .app-main   { margin-left: 0; }
      .app-topbar { display: none; }
      .kpi-grid   { grid-template-columns: repeat(2,1fr); gap: 10px; }
      .chart-grid-2  { grid-template-columns: 1fr; }
      .form-grid-3   { grid-template-columns: 1fr; }
      .form-grid-2   { grid-template-columns: 1fr; }
      .col-map-grid  { grid-template-columns: 1fr; }
      .cat-icon-grid { grid-template-columns: repeat(4,1fr); }
      .budget-col-hide { display: none; }
      .main-content  { padding: 16px 14px 88px; }
      .chat-container{ height: 65vh; }

      /* Mobile topbar (substitueix el header) */
      .mobile-topbar {
        position: fixed; top: 0; left: 0; right: 0; height: 52px;
        background: #0f172a; color: #fff;
        display: flex; align-items: center; justify-content: space-between;
        padding: 0 16px; z-index: 50;
      }
      .main-content { padding-top: 64px; }

      .bottom-nav {
        display: flex !important;
        position: fixed; bottom: 0; left: 0; right: 0;
        background: var(--surface); border-top: 1px solid var(--border);
        z-index: 100; padding: 8px 4px calc(env(safe-area-inset-bottom,10px) + 2px);
        box-shadow: 0 -2px 20px rgba(0,0,0,.1);
        align-items: flex-end; justify-content: space-around;
        backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      }
      .nav-icon-btn {
        flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;
        border:none; background:transparent; cursor:pointer; padding:4px 2px; min-width:0;
      }
      .nav-icon-wrap {
        width:44px; height:44px; border-radius:14px;
        display:flex; align-items:center; justify-content:center;
        transition: background .15s, transform .1s;
      }
      .nav-icon-wrap.active { background: var(--em-ll); transform: scale(1.08); }
      body.dark .nav-icon-wrap.active { background: rgba(16,185,129,.18); }
      .nav-icon-wrap:not(.active):active { background: var(--surface2); }
      .nav-icon-label { font-size:9px; font-weight:600; color:var(--subtle);
        letter-spacing:.02em; white-space:nowrap; font-family:'DM Sans',sans-serif; }
      .nav-icon-label.active { color: var(--em); }

      /* FAB */
      .fab-btn {
        width:52px; height:52px; border-radius:16px;
        background: var(--em); border:none; color:#fff;
        display:flex; align-items:center; justify-content:center;
        flex-shrink:0; margin-bottom:2px; cursor:pointer;
        box-shadow: 0 4px 16px rgba(16,185,129,.4);
        transition: transform .12s, box-shadow .12s;
      }
      .fab-btn:active { transform:scale(.9); }
    }
    @media (max-width: 480px) {
      .kpi-grid { grid-template-columns: repeat(2,1fr); gap:8px; }
      .cat-icon-grid { grid-template-columns: repeat(3,1fr); }
    }

/* ═══════════════════════════════════════════
   CSS VERSIÓ MÒBIL
═══════════════════════════════════════════ */
.m-bar{position:fixed;bottom:0;left:0;right:0;height:calc(var(--bar-h) + var(--safe-bottom));padding-bottom:var(--safe-bottom);background:rgba(255,255,255,.97);border-top:1px solid rgba(0,0,0,.08);display:flex;align-items:center;justify-content:space-around;z-index:100;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
.m-bar::before{content:"";position:absolute;top:-1px;left:50%;transform:translateX(-50%);width:56px;height:1px;background:linear-gradient(90deg,transparent,#10B981,transparent);}
.m-bar-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 0;border:none;background:transparent;cursor:pointer;transition:opacity .15s;}
.m-bar-btn:active{opacity:.7;}
.m-bar-label{font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;transition:color .2s;}
.m-bar-btn.active .m-bar-label{color:#10B981;}
.m-bar-btn:not(.active) .m-bar-label{color:rgba(0,0,0,.35);}
.m-bar-sep{width:1px;height:22px;background:rgba(0,0,0,.08);flex-shrink:0;}

.m-screen{min-height:100dvh;padding-bottom:calc(var(--bar-h) + var(--safe-bottom) + 8px);background:#F5F3EF;overflow-y:auto;}

.login-wrap{min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 28px;background:linear-gradient(170deg,#F0EDE8 0%,#E8E4DE 55%,#EDE9E3 100%);}
.login-logo{width:60px;height:60px;background:linear-gradient(135deg,#1e4d7b,#0d3260);border-radius:18px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;box-shadow:0 10px 32px rgba(10,50,96,.55),0 0 0 1px rgba(0,0,0,.05);}
.login-brand{font-size:26px;font-weight:800;letter-spacing:-.04em;color:#1A1A2E;margin-bottom:3px;}
.login-sub{font-size:11px;color:rgba(0,0,0,.45);letter-spacing:.1em;text-transform:uppercase;font-weight:600;margin-bottom:32px;}
.login-form{width:100%;max-width:340px;}
.login-field{width:100%;background:#fff;border:1.5px solid #E4DFD8;border-radius:12px;padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px;transition:border-color .2s,background .2s;}
.login-field:focus-within{border-color:rgba(16,185,129,.5);background:rgba(16,185,129,.03);}
.login-field input{flex:1;background:transparent;border:none;outline:none;font-family:var(--font-sans);font-size:14px;color:#1A1A2E;}
.login-field input::placeholder{color:rgba(0,0,0,.35);}
.login-field-icon{font-size:15px;opacity:.4;flex-shrink:0;}
.login-btn{width:100%;margin-top:16px;background:linear-gradient(135deg,#10B981,#059669);border:none;border-radius:12px;padding:13px;font-family:var(--font-sans);font-size:14px;font-weight:700;color:#fff;cursor:pointer;box-shadow:0 6px 20px rgba(16,185,129,.4);transition:transform .1s;}
.login-btn:active{transform:scale(.98);}
.login-btn:disabled{opacity:.6;pointer-events:none;}
.login-divider{display:flex;align-items:center;gap:10px;margin:18px 0 14px;width:100%;max-width:340px;}
.login-divider-line{flex:1;height:1px;background:rgba(0,0,0,.1);}
.login-divider-txt{font-size:10px;color:rgba(0,0,0,.40);}
.login-google-btn{width:100%;max-width:340px;background:#fff;border:1.5px solid #E4DFD8;border-radius:12px;padding:12px;font-family:var(--font-sans);font-size:13px;color:#7A7A9A;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;}
.login-google-btn:active{background:rgba(0,0,0,.07);}
.login-error{margin-top:12px;padding:10px 14px;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.2);border-radius:10px;font-size:12px;color:var(--red);text-align:center;width:100%;max-width:340px;}
.login-privacy{margin-top:20px;font-size:10px;color:rgba(0,0,0,.40);text-align:center;line-height:1.6;max-width:280px;}

.dash-topbar{padding:52px 18px 12px;display:flex;align-items:center;justify-content:space-between;}
.dash-greeting{font-size:13px;color:rgba(0,0,0,.50);}
.dash-greeting strong{color:rgba(0,0,0,.80);font-weight:700;}
.dash-month-pill{background:rgba(0,0,0,.05);border:1px solid rgba(0,0,0,.08);border-radius:20px;padding:4px 10px;font-size:10px;color:#7A7A9A;font-family:var(--font-mono);}
.dash-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#10B981,#1e4d7b);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;}
.dash-ring-wrap{display:flex;flex-direction:column;align-items:center;margin:4px 0 12px;position:relative;}
.dash-ring-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;}
.dash-ring-main{font-size:28px;font-weight:800;font-family:var(--font-mono);letter-spacing:-.04em;line-height:1;}
.dash-ring-lbl{font-size:11px;color:rgba(0,0,0,.55);margin-top:5px;letter-spacing:.05em;text-transform:uppercase;}
.dash-ring-sub{font-size:12px;color:rgba(0,0,0,.60);margin-top:5px;font-family:var(--font-mono);}
.dash-kpis{display:flex;gap:10px;padding:0 18px;margin-bottom:14px;}
.dash-kpi{flex:1;background:#FFFFFF;border:1px solid #E4DFD8;border-radius:12px;padding:10px 12px;box-shadow:0 2px 8px rgba(0,0,0,.04);}
.dash-kpi-label{font-size:9px;color:rgba(0,0,0,.50);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em;}
.dash-kpi-val{font-size:11px;font-weight:700;font-family:var(--font-mono);}
.dash-txns-title{padding:0 18px 8px;font-size:10px;color:rgba(0,0,0,.55);letter-spacing:.07em;text-transform:uppercase;font-weight:700;}
.dash-txn{display:flex;align-items:center;gap:10px;padding:9px 18px;border-top:1px solid rgba(0,0,0,.03);}
.dash-txn-icon{width:28px;height:28px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.dash-txn-name{font-size:12px;color:rgba(0,0,0,.75);font-weight:500;}
.dash-txn-cat{font-size:10px;color:rgba(0,0,0,.45);margin-top:1px;}
.dash-txn-amt{font-size:12px;font-weight:700;font-family:var(--font-mono);margin-left:auto;flex-shrink:0;}

.menu-topbar{padding:52px 18px 14px;display:flex;align-items:center;gap:10px;}
.menu-topbar-title{font-size:20px;font-weight:800;letter-spacing:-.03em;color:#1A1A2E;}
.menu-section-lbl{padding:0 18px 10px;font-size:10px;color:rgba(0,0,0,.55);letter-spacing:.07em;text-transform:uppercase;font-weight:700;}
.menu-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:0 18px;}
.menu-item{background:transparent;border:none;border-radius:0;padding:8px 4px 10px;display:flex;flex-direction:column;align-items:center;gap:8px;position:relative;cursor:pointer;transition:transform .1s;}
.menu-item::before{display:none;}
.menu-item:active{transform:scale(.92);}
.menu-icon-badge{width:64px;height:64px;border-radius:20px;display:flex;align-items:center;justify-content:center;position:relative;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);box-shadow:0 4px 16px rgba(0,0,0,.08),inset 0 1px 0 rgba(255,255,255,.6);}
.menu-icon-badge::after{content:"";position:absolute;top:2px;left:2px;right:2px;height:44%;border-radius:16px 16px 50% 50%;background:linear-gradient(180deg,rgba(255,255,255,.55) 0%,transparent 100%);pointer-events:none;}
body.dark .menu-icon-badge{box-shadow:0 4px 16px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.12) !important;}
body.dark .menu-icon-badge::after{background:linear-gradient(180deg,rgba(255,255,255,.12) 0%,transparent 100%) !important;}
.menu-item-label{font-size:10px;font-weight:600;color:rgba(0,0,0,.55);text-align:center;line-height:1.3;}
.menu-item-badge{position:absolute;top:7px;right:7px;background:#EF4444;min-width:16px;height:16px;border-radius:8px;padding:0 4px;font-size:8px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;}

.m-spinner-wrap{min-height:100dvh;display:flex;align-items:center;justify-content:center;background:#F5F3EF;}
.m-spinner{width:32px;height:32px;border:3px solid #E4DFD8;border-top-color:#10B981;border-radius:50%;animation:spin 1s linear infinite;}
.m-toast{position:fixed;bottom:calc(var(--bar-h) + var(--safe-bottom) + 16px);left:50%;transform:translateX(-50%);background:#1A1A2E;color:#F5F3EF;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:200;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.4);animation:popIn .3s cubic-bezier(.22,1,.36,1);}
.m-toast.err{background:var(--red);color:#fff;}
/* ── DARK MODE complet via !important ── */

body.dark .dash-txn-name { color:rgba(255,255,255,.85) !important; }
body.dark .dash-txn-cat { color:rgba(255,255,255,.35) !important; }
body.dark .dash-month-pill { background:rgba(255,255,255,.06) !important;border-color:rgba(255,255,255,.09) !important;color:rgba(255,255,255,.45) !important; }

body.dark .dash-ring-sub { color:rgba(255,255,255,.35) !important; }

body.dark .menu-section-lbl { color:rgba(255,255,255,.3) !important; }
body.dark .menu-item-label { color:rgba(255,255,255,.55) !important; }

body.dark .login-sub { color:rgba(255,255,255,.3) !important; }
body.dark .login-field { background:rgba(255,255,255,.05) !important;border-color:rgba(255,255,255,.08) !important; }
